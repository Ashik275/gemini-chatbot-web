<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Fetch Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f4f4f4;
    }

    button {
      padding: 10px 16px;
      cursor: pointer;
      margin-bottom: 15px;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>Fetch API Response</h2>

  <button onclick="callAPI()">Load Data</button>

  <pre id="output">Click button to load response...</pre>

  <script>
    function callAPI() {

      const myHeaders = new Headers();
      myHeaders.append("Authorization", "iHelp_Web_Fontainer@2025");

      const requestOptions = {
        method: "GET",
        headers: myHeaders,
        redirect: "follow"
      };

      fetch("https://43.229.13.253/web_fontainer_ticket_api/bsw_application.php", requestOptions)
        .then((response) => response.text())
        .then((result) => {
          document.getElementById("output").textContent = result;
          console.log(result);
        })
        .catch((error) => {
          document.getElementById("output").textContent = "Error: " + error;
          console.error(error);
        });
    }
  </script>

</body>
</html>
